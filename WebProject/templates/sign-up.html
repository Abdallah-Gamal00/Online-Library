{% extends "base.html" %}
{% load static %}

{% block title %}Sign Up - Online Library{% endblock %}

{% block head %}
    <link rel="stylesheet" href="{% static 'css_files/su-style.css' %}">
    <script src="{% static 'js_files/auth.js' %}" defer></script>
{% endblock %}

{% block content %}
<main>
    <form id="signup-form" action="" method="post">
        {% csrf_token %}
        <div class="container">
            <h1>Sign up</h1>
            <div class="username">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required />
            </div>
            <div class="email">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required />
            </div>
            <div class="password">
                <label for="password1">Password</label>
                <input type="password" id="password1" name="password1" placeholder="Enter your password" required />
            </div>
            <div class="confirm-password">
                <label for="password2">Confirm Password</label>
                <input type="password" id="password2" name="password2" placeholder="Confirm your password" required />
            </div>
            <div class="radio-buttons">
                <div class="user">
                    <input type="radio" id="user" name="role" value="user" checked required />
                    <label for="user">User</label>
                </div>
                <div class="admin">
                    <input type="radio" id="admin" name="role" value="admin" />
                    <label for="admin">Admin</label>
                </div>
            </div>
            <button type="submit" id="btn" onclick="event.preventDefault(); handleSignup();">Sign up</button>
            <p>Already have an account? <a href="{% url 'login' %}">Log in</a></p>
        </div>
    </form>
    <div class="circle"></div>
</main>

<script>
function handleSignup() {
    const username = document.getElementById('username').value;
    const email = document.getElementById('email').value;
    const password1 = document.getElementById('password1').value;
    const password2 = document.getElementById('password2').value;
    const role = document.querySelector('input[name="role"]:checked').value;
    
    auth.signup(username, email, password1, password2, role);
}
</script>
{% endblock %}
