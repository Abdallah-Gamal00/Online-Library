{% extends "base.html" %}
{% load static %}

{% block title %}Login - Online Library{% endblock %}

{% block head %}
    <link rel="stylesheet" href="{% static 'css_files/li-style.css' %}">
    <script src="{% static 'js_files/auth.js' %}" defer></script>
{% endblock %}

{% block content %}
<main>
    <form id="login-form" action="" method="post">
        {% csrf_token %}
        <div class="container">
            <h1>Log in</h1>
            <div class="username">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required />
            </div>
            <div class="password">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required />
            </div>
            <button type="submit" id="btn" onclick="event.preventDefault(); handleLogin();">Log in</button>
            <p>Do not have an account yet? <a href="{% url 'signup' %}">Sign up</a></p>
        </div>
    </form>
    <div class="circle"></div>
</main>

<script>
function handleLogin() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    
    auth.login(username, password);
}
</script>
{% endblock %}
